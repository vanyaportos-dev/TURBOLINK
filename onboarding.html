<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Представьтесь — TurboLink VPN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .onboarding-capsule {
      position: relative;
      z-index: 20;
      background: rgba(12, 12, 18, 0.7);
      backdrop-filter: blur(40px) saturate(180%);
      border-radius: 56px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      padding: 48px 40px;
      width: 90%;
      max-width: 440px;
      text-align: center;
      animation: capsuleFadeIn 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes capsuleFadeIn {
      0% { opacity: 0; transform: scale(0.96) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .onboarding-input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      color: white;
      font-size: 16px;
      font-family: var(--font-body);
      margin: 24px 0;
      text-align: center;
      transition: all 0.2s;
    }
    .onboarding-input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
    }
    .onboarding-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
</div>

<div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
  <div class="onboarding-capsule">
    <i class="fa-solid fa-hand-wave" style="font-size: 48px; color: var(--accent); margin-bottom: 16px;"></i>
    <h1 style="font-family: var(--font-head); font-size: 28px; margin-bottom: 8px;">Привет!</h1>
    <p style="color: var(--text-2); margin-bottom: 8px;">Как вас записать в нашу систему?</p>
    <p style="font-size: 12px; color: var(--text-3); margin-bottom: 16px;">(это имя будет отображаться в личном кабинете)</p>
    
    <input type="text" id="usernameInput" class="onboarding-input" placeholder="Введите ваше имя" maxlength="30" autocomplete="off">
    
    <div class="onboarding-buttons">
      <button onclick="skipName()" class="btn btn-ghost">Пропустить</button>
      <button onclick="saveName()" class="btn btn-primary">Сохранить</button>
    </div>
  </div>
</div>

<script>
  function saveName() {
    const name = document.getElementById('usernameInput').value.trim();
    if (name) {
      localStorage.setItem('tl_username', name);
    }
    window.location.href = 'dashboard.html';
  }
  
  function skipName() {
    window.location.href = 'dashboard.html';
  }
  
  // Enter на клавиатуре
  document.getElementById('usernameInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') saveName();
  });
</script>
</body>
</html>

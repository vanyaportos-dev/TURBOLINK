<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проверка — TurboLink VPN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background: #05050A;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ЖИДКИЙ ФОН — БЫСТРОЕ АКТИВНОЕ ДВИЖЕНИЕ */
    .liquid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.65;
      mix-blend-mode: screen;
      animation: floatBlob 12s ease-in-out infinite alternate;
      will-change: transform;
    }

    /* Зелёный — быстрый, большой размах */
    .blob-1 {
      background: #10B981;
      width: 65vw;
      height: 65vw;
      top: -10%;
      left: -10%;
      animation-duration: 10s;
    }

    /* Синий — летает по диагонали */
    .blob-2 {
      background: #3B82F6;
      width: 55vw;
      height: 55vw;
      bottom: -20%;
      right: -15%;
      animation-duration: 11s;
      animation-delay: -2s;
    }

    /* Фиолетовый — с резкими сменами направления */
    .blob-3 {
      background: #8B5CF6;
      width: 70vw;
      height: 70vw;
      top: 20%;
      left: 30%;
      animation-duration: 9s;
      animation-delay: -4s;
    }

    /* Янтарный — быстрый и плавный */
    .blob-4 {
      background: #F59E0B;
      width: 50vw;
      height: 50vw;
      bottom: 5%;
      left: 5%;
      animation-duration: 13s;
      animation-delay: -6s;
      opacity: 0.5;
    }

    /* Добавим красный для динамики */
    .blob-5 {
      background: #EF4444;
      width: 60vw;
      height: 60vw;
      top: 50%;
      right: 10%;
      animation-duration: 14s;
      animation-delay: -8s;
      opacity: 0.4;
    }

    @keyframes floatBlob {
      0% {
        transform: translate(0, 0) scale(1);
      }
      20% {
        transform: translate(15%, -10%) scale(1.15);
      }
      40% {
        transform: translate(-8%, 18%) scale(0.9);
      }
      60% {
        transform: translate(20%, 12%) scale(1.1);
      }
      80% {
        transform: translate(-12%, -15%) scale(0.95);
      }
      100% {
        transform: translate(8%, -8%) scale(1.05);
      }
    }

    /* КАПСУЛА */
    .glass-capsule {
      position: relative;
      z-index: 20;
      background: rgba(12, 12, 18, 0.7);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-radius: 56px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      padding: 48px 40px;
      width: 90%;
      max-width: 440px;
      text-align: center;
      animation: capsuleFadeIn 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes capsuleFadeIn {
      0% {
        opacity: 0;
        transform: scale(0.96) translateY(20px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .message-line {
      min-height: 100px;
      margin-bottom: 32px;
    }

    .dynamic-text {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #ffffff;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .dynamic-text.fade-out {
      opacity: 0;
    }

    .circular-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .spinner-ring {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(16, 185, 129, 0.25);
      border-top: 3px solid #10B981;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .check-icon {
      font-size: 72px;
      color: #10B981;
      margin-bottom: 24px;
      animation: checkPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      transform: scale(0);
    }

    @keyframes checkPop {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .powered {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .powered i {
      font-size: 12px;
      color: #10B981;
    }
  </style>
</head>
<body>

<!-- АКТИВНЫЙ ЖИДКИЙ ФОН (5 пятен) -->
<div class="liquid-bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
</div>

<!-- КАПСУЛА -->
<div class="glass-capsule" id="capsule">
  <div class="message-line" id="messageLine">
    <div class="dynamic-text" id="firstMessage">Проверяем Ваш входной трафик...</div>
  </div>
  <div class="circular-spinner" id="spinner">
    <div class="spinner-ring"></div>
  </div>
  <div class="powered">
    <i class="fa-solid fa-bolt"></i> POWERED BY TURBOLINK <i class="fa-solid fa-globe"></i>
  </div>
</div>

<script>
  (function() {
    const capsule = document.getElementById('capsule');
    const firstMsgDiv = document.getElementById('firstMessage');

    const randomPhrases = [
      'Анализируем сетевое подключение...',
      'Настраиваем защищённый туннель...',
      'Сканируем активность...',
      'Оптимизируем маршрут...',
      'Проверяем шифрование...',
      'Калибруем VPN-канал...',
      'Устанавливаем безопасное соединение...',
      'Загружаем конфигурацию сервера...'
    ];

    let phraseInterval;
    let currentPhraseIndex = 0;

    setTimeout(() => {
      firstMsgDiv.classList.add('fade-out');
    }, 1500);

    setTimeout(() => {
      firstMsgDiv.style.display = 'none';
      const messageLine = document.getElementById('messageLine');

      function updateRandomPhrase() {
        const oldDiv = messageLine.querySelector('.dynamic-text:not(.fade-out)');
        if (oldDiv) oldDiv.remove();

        let randomIndex;
        do {
          randomIndex = Math.floor(Math.random() * randomPhrases.length);
        } while (randomIndex === currentPhraseIndex && randomPhrases.length > 1);
        currentPhraseIndex = randomIndex;

        const phrase = randomPhrases[currentPhraseIndex];
        const phraseDiv = document.createElement('div');
        phraseDiv.className = 'dynamic-text';
        phraseDiv.textContent = phrase;
        messageLine.appendChild(phraseDiv);
      }

      updateRandomPhrase();
      phraseInterval = setInterval(updateRandomPhrase, 2100);
    }, 1800);

    setTimeout(() => {
      if (phraseInterval) clearInterval(phraseInterval);
      capsule.innerHTML = '';

      const checkDiv = document.createElement('div');
      checkDiv.className = 'check-icon';
      checkDiv.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
      capsule.appendChild(checkDiv);

      const successText = document.createElement('div');
      successText.style.cssText = 'color: #10B981; font-size: 14px; margin-top: 8px; font-weight: 500;';
      successText.textContent = 'Вход подтверждён';
      capsule.appendChild(successText);

      const poweredDiv = document.createElement('div');
      poweredDiv.className = 'powered';
      poweredDiv.innerHTML = '<i class="fa-solid fa-bolt"></i> POWERED BY TURBOLINK <i class="fa-solid fa-globe"></i>';
      capsule.appendChild(poweredDiv);

      setTimeout(() => {
        window.location.href = 'home.html';
      }, 900);
    }, 6200);
  })();
</script>
</body>
</html>
